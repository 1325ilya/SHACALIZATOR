name: Build unsigned IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Shacalizator (unsigned)
    # Используй macos-latest если macos-26 ещё недоступен
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode & macOS info
        run: |
          echo "=== macOS ==="
          sw_vers
          echo ""
          echo "=== Xcode ==="
          xcodebuild -version
          echo ""
          echo "=== SDK ==="
          xcodebuild -showsdks 2>/dev/null | grep iphoneos || echo "No iphoneos SDK found"

      - name: Build app without signing
        run: |
          xcodebuild \
            -project Shacalizator.xcodeproj \
            -scheme Shacalizator \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package unsigned IPA
        run: |
          chmod +x scripts/package_unsigned_ipa.sh
          ./scripts/package_unsigned_ipa.sh

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: Shacalizator_unsigned_ipa
          path: Shacalizator_unsigned.ipa
          if-no-files-found: error
